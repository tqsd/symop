repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff-format
        files: ^src/
      - id: ruff
        args: [--fix]
        files: ^src/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^src/
        additional_dependencies:
          - numpy
          - scipy
          - matplotlib
          - typing-extensions
          - ipython
